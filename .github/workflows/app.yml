name: Go Build App

on:
 workflow_dispatch:
   inputs:
     os:
       description: Target OS
       required: true
       default: darwin
       type: choice
       options:
         - darwin
         - linux
         - windows
     arch:
       description: Target architecture
       required: true
       default: amd64
       type: choice
       options:
         - amd64
         - arm64

jobs:
 build:
   runs-on: ${{ inputs.os == 'darwin' && 'macos-latest' || inputs.os == 'windows' && 'windows-latest' || 'ubuntu-latest' }}

   steps:
     - name: Checkout
       uses: actions/checkout@v4

     - name: Set up Go
       uses: actions/setup-go@v5
       with:
         go-version-file: go.mod

     # ── Linux amd64 ────────────────────────────────────────────────────────
     - name: Install build dependencies (linux amd64)
       if: inputs.os == 'linux' && inputs.arch == 'amd64'
       run: |
         sudo apt-get update -q
         sudo apt-get install -y \
           gcc \
           libgl1-mesa-dev \
           libx11-dev \
           libxcursor-dev \
           libxrandr-dev \
           libxinerama-dev \
           libxi-dev \
           libxxf86vm-dev \
           libasound2-dev

     # ── Linux arm64 ────────────────────────────────────────────────────────
     - name: Install build dependencies (linux arm64)
       if: inputs.os == 'linux' && inputs.arch == 'arm64'
       run: |
         sudo apt-get update -q
         sudo apt-get install -y \
           gcc-aarch64-linux-gnu \
           g++-aarch64-linux-gnu \
           libgl1-mesa-dev \
           libx11-dev \
           libxcursor-dev \
           libxrandr-dev \
           libxinerama-dev \
           libxi-dev \
           libxxf86vm-dev \
           libasound2-dev

     # ── Windows arm64 ──────────────────────────────────────────────────────
     - name: Install build dependencies (windows arm64)
       if: inputs.os == 'windows' && inputs.arch == 'arm64'
       shell: powershell
       run: |
         choco install llvm --yes
         echo "CC=clang" >> $env:GITHUB_ENV
         echo "CXX=clang++" >> $env:GITHUB_ENV

     # ── Darwin amd64 on arm64 runner ───────────────────────────────────────
     - name: Select macOS runner sdk (darwin amd64)
       if: inputs.os == 'darwin' && inputs.arch == 'amd64'
       run: |
         echo "SDKROOT=$(xcrun --sdk macosx --show-sdk-path)" >> $GITHUB_ENV

     # ── Dependencies ───────────────────────────────────────────────────────
     - name: Get dependencies
       shell: bash
       run: |
         go get gioui.org
         go get github.com/faiface/beep
         go mod tidy

     # ── Naming ─────────────────────────────────────────────────────────────
     - name: Set binary name
       id: naming
       shell: bash
       run: |
         NAME=gopher-typist
         if [ "${{ inputs.os }}" = "windows" ]; then
           NAME="${NAME}.exe"
         fi
         echo "binary=${NAME}" >> $GITHUB_OUTPUT
         echo "artifact=gopher-typist-${{ inputs.os }}-${{ inputs.arch }}" >> $GITHUB_OUTPUT

     # ── Build ──────────────────────────────────────────────────────────────
     - name: Build (linux arm64)
       if: inputs.os == 'linux' && inputs.arch == 'arm64'
       env:
         GOOS:        linux
         GOARCH:      arm64
         CGO_ENABLED: 1
         CC:          aarch64-linux-gnu-gcc
         CXX:         aarch64-linux-gnu-g++
       run: go build -o bin/${{ steps.naming.outputs.binary }} .

     - name: Build (windows arm64)
       if: inputs.os == 'windows' && inputs.arch == 'arm64'
       shell: powershell
       env:
         GOOS:        windows
         GOARCH:      arm64
         CGO_ENABLED: 1
       run: go build -o bin/${{ steps.naming.outputs.binary }} .

     - name: Build (all others)
       if: |
         !(inputs.os == 'linux'   && inputs.arch == 'arm64') &&
         !(inputs.os == 'windows' && inputs.arch == 'arm64')
       shell: bash
       env:
         GOOS:        ${{ inputs.os }}
         GOARCH:      ${{ inputs.arch }}
         CGO_ENABLED: 1
       run: go build -o bin/${{ steps.naming.outputs.binary }} .

     # ── Artifact ───────────────────────────────────────────────────────────
     - name: Upload artifact
       uses: actions/upload-artifact@v4
       with:
         name: ${{ steps.naming.outputs.artifact }}
         path: bin/${{ steps.naming.outputs.binary }}
         retention-days: 30
